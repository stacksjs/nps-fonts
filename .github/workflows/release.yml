name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python (fontTools for variable-font merge)
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install fontTools into .venv
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet fonttools

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build fonts
        run: bun run build

      - name: Sanity-check fonts
        run: bun run check

      - name: Pack npm packages
        env:
          NPM_VERSION: ${{ steps.ver.outputs.version }}
        run: bun run pack:all

      - name: Build family ZIPs
        run: |
          mkdir -p dist
          for fam in nps-2026 redwood-serif campmate-script nps-symbols; do
            cd fonts && zip -r "../dist/nps-fonts-${fam}-${{ steps.ver.outputs.version }}.zip" "$fam" && cd ..
          done
          cd fonts && zip -r "../dist/nps-fonts-all-${{ steps.ver.outputs.version }}.zip" . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.zip
            OFL.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish npm packages
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in packages/*/; do
            pkg=$(basename "$dir")
            echo "→ Publishing @nps-fonts/$pkg"
            (cd "$dir" && bun publish --access public)
          done
